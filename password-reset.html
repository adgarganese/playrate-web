<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlayRate — password reset</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #0b0f1a; color: #f4f7ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    p { max-width: 320px; line-height: 1.45; font-size: 15px; }
    a { color: #6b9fff; font-weight: 600; word-break: break-all; }
    .muted { color: rgba(244,247,255,0.65); font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <p id="msg">Opening PlayRate…</p>
  <p id="manual" class="muted" style="display:none">If the app did not open, tap the link below (some in-app browsers block automatic redirects).</p>
  <p id="linkwrap" style="display:none"><a id="open" href="#">Open in PlayRate app</a></p>
  <script>
    (function () {
      var hash = window.location.hash || '';
      var msg = document.getElementById('msg');
      var manual = document.getElementById('manual');
      var linkwrap = document.getElementById('linkwrap');
      var openLink = document.getElementById('open');

      if (!hash || hash.length < 2) {
        msg.textContent = 'This reset link is invalid or incomplete. Open the PlayRate app and request a new password reset email.';
        return;
      }

      var target = 'playrate://reset-password' + hash;
      openLink.href = target;

      function showManual() {
        manual.style.display = 'block';
        linkwrap.style.display = 'block';
      }

      try {
        window.location.replace(target);
      } catch (e) {
        showManual();
        msg.textContent = 'Tap the link below to continue in the PlayRate app.';
        return;
      }

      setTimeout(showManual, 1200);
    })();
  </script>
</body>
</html>
